<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <title>Goat Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="player-shell">
    <section class="player" aria-label="Goat Player">
      <img class="logo" src="assets/goat-player-logo.svg" alt="Goat Player">

      <div class="peace">Peace</div>

      <div class="track-info" aria-live="polite">
        <div class="music-note" aria-hidden="true">♫</div>
        <div>
          <h1 id="trackTitle">Sample Track</h1>
          <p id="trackArtist">Artist Name</p>
        </div>
      </div>

      <div class="time-progress">
        <span id="currentTime">0:00</span>
        <input id="seek" type="range" min="0" max="1000" value="0" aria-label="Song position">
        <span id="duration">0:08</span>
      </div>

      <div class="controls">
        <button id="previous" type="button" aria-label="Previous track">|◀</button>
        <button id="play" class="play" type="button" aria-label="Play">▶</button>
        <button id="next" type="button" aria-label="Next track">▶|</button>
      </div>

      <div class="volume-row">
        <span aria-hidden="true">🔈</span>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.78" aria-label="Volume">
        <span aria-hidden="true">🔊</span>
      </div>

      <div class="journey" id="journey" aria-label="Song journey">
        <div class="journey-line"></div>
        <img id="goaty" src="assets/goaty.png" alt="Goaty">
        <span class="hoof h1">•</span>
        <span class="hoof h2">•</span>
        <span class="hoof h3">•</span>
        <span class="hoof h4">•</span>
      </div>

      <audio id="audio" src="assets/demo-tone.wav" preload="metadata"></audio>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
