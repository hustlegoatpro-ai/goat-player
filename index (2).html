<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <title>Goat Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="player" aria-label="Goat Player">
      <img class="logo" src="goat-player-logo.svg" alt="Goat Player logo">

      <div class="peace">Peace</div>

      <div class="content-grid">
        <div class="main-column">
          <div class="track-info">
            <span class="note" aria-hidden="true">♫</span>
            <div>
              <h1 id="trackTitle">No track selected</h1>
              <p id="trackArtist">Choose an audio file</p>
            </div>
          </div>

          <label class="file-button">
            Choose Audio
            <input id="filePicker" type="file" accept="audio/*">
          </label>

          <div class="seek-row">
            <span id="currentTime">0:00</span>
            <input id="seek" type="range" min="0" max="1000" value="0" aria-label="Song position">
            <span id="duration">0:00</span>
          </div>

          <div class="controls">
            <button id="previous" type="button" aria-label="Restart track">|◀</button>
            <button id="play" class="play" type="button" aria-label="Play">▶</button>
            <button id="next" type="button" aria-label="Go to end">▶|</button>
          </div>

          <div class="journey" id="journey">
            <div class="journey-line"></div>
            <img id="goaty" class="goaty" src="goaty.png" alt="Goaty">
            <span class="hoof h1">••</span>
            <span class="hoof h2">••</span>
            <span class="hoof h3">••</span>
            <span class="hoof h4">••</span>
          </div>
        </div>

        <aside class="volume-panel" aria-label="Volume">
          <div class="volume-label">Volume</div>
          <span aria-hidden="true">🔊</span>
          <input id="volume" type="range" min="0" max="1" step="0.01" value="0.78" aria-label="Volume">
          <span aria-hidden="true">🔉</span>
          <span id="volumeValue">78%</span>
        </aside>
      </div>

      <footer>
        <div>Free • Open Source • Embeddable</div>
        <small>Goat only moon walks on a blue moon.</small>
      </footer>

      <audio id="audio" preload="metadata"></audio>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
